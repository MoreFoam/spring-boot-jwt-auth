services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: spring_boot_jwt_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_17_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d spring_boot_jwt_auth"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_17_data:
