##############
### Spring ###
##############
spring.application.name=spring-boot-jwt-auth
spring.config.import=optional:file:.env[.properties]
spring.docker.compose.file=compose.local.yaml
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/spring_boot_jwt_auth}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.open-in-view=false
##############
### Server ###
##############
server.servlet.context-path=/api
server.servlet.session.timeout=30m
###############
### Logging ###
###############
# logging.level.root=INFO
################################
##### Spring Boot Jwt Auth #####
################################
# Required. Use the following command to generate a random HS256 key:
# openssl rand -base64 32
spring-boot-jwt-auth.security.jwt.secret-key=${JWT_SECRET_KEY}
# 30-min access token expiration --> 1800000 ms
spring-boot-jwt-auth.security.jwt.expiration=${JWT_EXPIRATION_MS:1800000}
# 60-day refresh token expiration --> 5184000000 ms
spring-boot-jwt-auth.security.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION_MS:5184000000}
# Browser refresh-token cookie settings
spring-boot-jwt-auth.security.refresh-cookie.name=${REFRESH_COOKIE_NAME:refreshToken}
spring-boot-jwt-auth.security.refresh-cookie.path=${REFRESH_COOKIE_PATH:/api/auth/web}
# Set to true when serving over HTTPS outside local development.
spring-boot-jwt-auth.security.refresh-cookie.secure=${REFRESH_COOKIE_SECURE:false}
spring-boot-jwt-auth.security.refresh-cookie.same-site=${REFRESH_COOKIE_SAME_SITE:Lax}
spring-boot-jwt-auth.security.refresh-cookie.max-age-seconds=${REFRESH_COOKIE_MAX_AGE_SECONDS:5184000}
# Browser CSRF-token cookie settings
spring-boot-jwt-auth.security.csrf-cookie.path=${CSRF_COOKIE_PATH:/}
# Set to true when serving over HTTPS outside local development.
spring-boot-jwt-auth.security.csrf-cookie.secure=${CSRF_COOKIE_SECURE:false}
spring-boot-jwt-auth.security.csrf-cookie.same-site=${CSRF_COOKIE_SAME_SITE:Lax}
############
### CORS ###
############
# !!! CHANGE ALLOWED ORIGINS FOR PRODUCTION !!!
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
